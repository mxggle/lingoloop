appId: com.loopmate.app
productName: Loopmate
copyright: Copyright © 2024 Loopmate

directories:
  buildResources: build
  output: dist-electron

files:
  - out/**/*
  - node_modules/**/*
  - package.json

mac:
  target:
    - dmg
    - zip
  category: public.app-category.music
  entitlementsInherit: build/entitlements.mac.plist

win:
  target:
    - nsis
    - portable
    - zip

linux:
  target:
    - AppImage
    - deb
  category: Audio

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
